<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Connectopia – Dashboard</title>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- SIDEBAR -->
<nav id="sidebar">
  <div class="sb-logo">Connectopia</div>
  <div class="sb-nav">
    <a class="active">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Dashboard
    </a>
    <a>
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
      Leads
    </a>
  </div>
  <div class="sb-footer">
    <span id="sb-user"></span>
    <button class="btn-logout" onclick="logout()">Sign Out</button>
  </div>
</nav>

<!-- MAIN -->
<div id="main">
  <!-- TOPBAR -->
  <div id="topbar">
    <h1>Lead Manager</h1>
    <input id="search" type="text" placeholder="🔍  Search name or email…"/>
    <div class="filter-wrap">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="new">New</button>
      <button class="filter-btn" data-filter="contacted">Contacted</button>
      <button class="filter-btn" data-filter="closed">Closed</button>
    </div>
    <button id="btn-add" onclick="openAddModal()">+ Add Lead</button>
  </div>

  <!-- STATS -->
  <div id="stats">
    <div class="stat-card s-total"><div class="s-val" id="st-total">0</div><div class="s-label">Total</div></div>
    <div class="stat-card s-new"><div class="s-val" id="st-new">0</div><div class="s-label">New</div></div>
    <div class="stat-card s-contacted"><div class="s-val" id="st-contacted">0</div><div class="s-label">Contacted</div></div>
    <div class="stat-card s-closed"><div class="s-val" id="st-closed">0</div><div class="s-label">Closed</div></div>
  </div>

  <!-- TABLE -->
  <div id="content">
    <div id="lead-count"></div>
    <div id="lead-table-wrap">
      <table>
        <thead><tr><th>ID</th><th>Name</th><th>Contact</th><th>Message</th><th>Date</th><th>Status</th><th></th></tr></thead>
        <tbody id="lead-tbody"></tbody>
      </table>
      <div id="empty-state" style="display:none">
        <p>No leads found. Add your first lead!</p>
      </div>
    </div>
  </div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="overlay" id="form-modal" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h2 id="form-modal-title">Add Lead</h2>
      <button class="modal-close" onclick="closeFormModal()">✕</button>
    </div>
    <div class="modal-body">
      <div id="form-err" class="alert-error" style="display:none"></div>
      <div class="form-row">
        <div class="form-group"><label>Full Name *</label><input id="f-name" placeholder="Jane Doe"/><span class="err" id="err-name"></span></div>
        <div class="form-group"><label>Email *</label><input id="f-email" type="email" placeholder="jane@example.com"/><span class="err" id="err-email"></span></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Phone *</label><input id="f-phone" placeholder="+91 9876543210"/><span class="err" id="err-phone"></span></div>
        <div class="form-group"><label>Status</label>
          <select id="f-status">
            <option value="new">New</option>
            <option value="contacted">Contacted</option>
            <option value="closed">Closed</option>
          </select>
        </div>
      </div>
      <div class="form-group"><label>Message</label><textarea id="f-message" placeholder="Lead message…"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeFormModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveLead()">Save Lead</button>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="overlay" id="detail-modal" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <div>
        <h2 id="d-name"></h2>
        <div id="d-leadid" style="font-size:.78rem;color:var(--muted);font-family:monospace"></div>
      </div>
      <button class="modal-close" onclick="closeDetailModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="detail-grid">
        <div class="detail-item"><div class="d-label">Email</div><div class="d-val" id="d-email"></div></div>
        <div class="detail-item"><div class="d-label">Phone</div><div class="d-val" id="d-phone"></div></div>
        <div class="detail-item">
          <div class="d-label">Status</div>
          <select id="d-status-sel" onchange="updateStatus()">
            <option value="new">New</option>
            <option value="contacted">Contacted</option>
            <option value="closed">Closed</option>
          </select>
        </div>
        <div class="detail-item"><div class="d-label">Date Added</div><div class="d-val" id="d-date"></div></div>
        <div class="detail-item full"><div class="d-label">Message</div><div class="d-val" id="d-message" style="white-space:pre-wrap;color:var(--muted)"></div></div>
      </div>
      <div class="notes-section">
        <h3>Notes</h3>
        <div id="d-notes-list"></div>
        <div class="note-input-row">
          <input id="note-input" placeholder="Add a note…" onkeydown="if(event.key==='Enter')addNote()"/>
          <button onclick="addNote()">Add</button>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger" onclick="deleteLead()">Delete</button>
      <button class="btn btn-secondary" onclick="openEditModal()">Edit</button>
      <button class="btn btn-secondary" onclick="closeDetailModal()">Close</button>
    </div>
  </div>
</div>

<script src="js/auth.js"></script>
<script src="js/app.js"></script>
</body>
</html>
